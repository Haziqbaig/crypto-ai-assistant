name: 24/7 Price Alerts

on:
  schedule:
    # Every 5 minutes (GitHub may throttle to ~every 5-15 min on busy periods)
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # manual "Run workflow" button for testing

permissions:
  contents: write

concurrency:
  group: price-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check price alerts
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node scripts/check-alerts.js

      - name: Persist triggered-state (avoids repeat emails)
        run: |
          if ! git diff --quiet -- .alerts-state.json 2>/dev/null || [ -n "$(git status --porcelain .alerts-state.json)" ]; then
            git config user.name "alerts-bot"
            git config user.email "actions@github.com"
            git add .alerts-state.json
            git commit -m "chore: update alert state [skip ci]"
            git push
          fi
